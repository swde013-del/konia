<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사이트 관리자</title>

<style>
body{
  font-family:sans-serif;
  background:#0f0f0f;
  color:white;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 로그인 */
#loginBox{
  background:#1b1b1b;
  padding:40px;
  border-radius:10px;
  text-align:center;
}

input{
  padding:10px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:6px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
  margin:5px;
}

/* 관리자 UI */
#adminUI{
  display:none;
  width:90%;
  max-width:1000px;
}

.panel{
  background:#1b1b1b;
  padding:20px;
  margin:15px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- 로그인 -->
<div id="loginBox">
<h2>관리자 로그인</h2>

<input type="password" id="password" placeholder="비밀번호">

<br><br>

<button onclick="login()">접속</button>

<p id="msg"></p>
</div>

<!-- 관리자 UI -->
<div id="adminUI">

<h1>사이트 관리자 패널</h1>

<!-- 사이트 통계 -->
<div class="panel">

<h3>📊 사이트 통계</h3>

<p>방문자 : <span id="visitCount">0</span></p>

<p>관리자 접속 시간 : <span id="time"></span></p>

</div>

<!-- 지도 관리 -->
<div class="panel">

<h3>🗺 지도 관리</h3>

<button onclick="openPage('map.html')">
지도 페이지 열기
</button>

<button onclick="openPage('map-editor.html')">
지도 편집기
</button>

</div>

<!-- 위키 관리 -->
<div class="panel">

<h3>📝 위키 수정</h3>

<button onclick="openPage('wiki.html')">
위키 페이지 열기
</button>

<button onclick="openPage('wiki-editor.html')">
위키 편집기
</button>

</div>

</div>

<script>

/* 비밀번호 */

const correctPassword = "1835";


function login(){

const pw = document.getElementById("password").value;

if(pw === correctPassword){

document.getElementById("loginBox").style.display="none";
document.getElementById("adminUI").style.display="block";

/* 접속 시간 */

const now = new Date();
document.getElementById("time").innerText = now.toLocaleString();

/* 방문자 수 */

let count = localStorage.getItem("visitCount");

if(!count){
count = 0;
}

count++;

localStorage.setItem("visitCount",count);

document.getElementById("visitCount").innerText = count;

}else{

document.getElementById("msg").innerText="비밀번호가 틀렸습니다";

}

}


/* 새 창 열기 */

function openPage(page){

window.open(page,"_blank");

}

</script>

</body>
</html>
